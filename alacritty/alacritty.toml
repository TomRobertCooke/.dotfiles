[general]
import = [
  "rose-pine.toml",
]

[window]
padding = { x = 5, y = 5 }
opacity = 0.95
decorations = "none"
startup_mode = "Windowed"
dimensions = { columns = 153, lines = 38 }

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"

[font.offset]
x = 0
y = 0
