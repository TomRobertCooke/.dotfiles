unbind r
bind r source-file ~/.tmux.conf

# ` key bound to leader
unbind C-b
set -g prefix `

# Double press to send a ` character
bind-key ` send-prefix

set -g mouse on

set-option -g status-position top

# Vim navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# RGB Color Override
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "joaofelipegalvao/tokyo-night-tmux"

set -g @tokyo-night-tmux_theme night   # night | storm | moon | day
set -g @tokyo-night-tmux_window_id_style hsquare   # window tab numbers
set -g @tokyo-night-tmux_pane_id_style hsquare     # pane number shown in status bar
set -g @tokyo-night-tmux_zoom_id_style qsquare     # pane number shown when zoomed

